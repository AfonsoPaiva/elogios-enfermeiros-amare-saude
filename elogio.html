<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" />
    <title>Deixe um elogio</title>
    <style>
        /* Botão de enviar no fundo do painel */
        .btn-enviar {
            display: block;
            width: 100%;
            background-color: var(--green-dark);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius-md);
            padding: 16px;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            margin-top: 16px;
            transition: opacity 0.2s;
        }

        .btn-enviar:hover {
            opacity: 0.88;
        }

        .btn-enviar:active {
            opacity: 0.75;
        }

        /* Etiqueta com o nome do médico abaixo do círculo */
        .nurse-label {
            position: absolute;
            top: 196px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--white);
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            text-align: center;
            z-index: 5;
        }

        /* Overlay do alerta customizado */
        .custom-alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        /* Caixa de alerta */
        .custom-alert-box {
            background-color: var(--ivory);
            border: 3px solid var(--red);
            border-radius: var(--border-radius-md);
            width: calc(100% - 40px);
            max-width: 320px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: alertScaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes alertScaleIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Ícone de alerta */
        .custom-alert-icon {
            color: var(--red);
            margin-bottom: 12px;
        }

        /* Mensagem */
        .custom-alert-message {
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* Botão do alerta */
        .custom-alert-btn {
            background-color: var(--red);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius-sm);
            padding: 10px 32px;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .custom-alert-btn:hover {
            opacity: 0.9;
        }

        .custom-alert-btn:active {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <!-- Dialog de Aviso Customizado -->
    <div id="custom-alert" class="custom-alert-overlay" style="display: none;">
        <div class="custom-alert-box">
            <div class="custom-alert-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
            <div class="custom-alert-message" id="custom-alert-msg">Por favor escreva o seu elogio antes de enviar.</div>
            <button class="custom-alert-btn" onclick="fecharAlerta()">Ok</button>
        </div>
    </div>

    <div class="page elogio-page">
        <a href="./escolha-med.html" class="back-btn" id="back-link"
            style="position: absolute; top: 34px; right: 16px; z-index: 10;">
            <span></span>
            <span></span>
        </a>

        <div class="profile-circle-outer">
            <div class="profile-circle-inner" id="profile-inner">
            </div>
        </div>


        <div class="content-panel">
            <div class="title">Deixe um elogio!</div>

            <div class="text-area-wrapper">
                <div class="text-area-bg">
                    <textarea class="text-area-inner" id="elogio-text" placeholder="Escreva aqui..."></textarea>
                </div>
            </div>

            <a href="./Insp.html" class="inspiration-btn" id="insp-link" style="display: block; text-decoration: none;">
                <span class="bold">Sem inspiração?</span>
                <span class="extra-bold"> </span>
                <span class="light">Vê aqui algumas das coisas que o teu médico faz por si</span>
            </a>

            <button class="btn-enviar" id="btn-enviar" onclick="enviarElogio()">Enviar elogio</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        // 1. Ler parâmetros da URL
        const params = new URLSearchParams(window.location.search);
        const nome = params.get('nome');
        const foto = params.get('foto');

        const profileInner = document.getElementById('profile-inner');
        const nurseLabel = document.getElementById('nurse-label');

        // 2. Configurar imagem ou ícone
        if (foto) {
            profileInner.innerHTML = `<img src="./${foto}" alt="${nome || 'Médico'}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;" onerror="this.style.background='#0c9543'" />`;
        } else {
            profileInner.style.backgroundColor = '#0c9543';
            profileInner.style.display = 'flex';
            profileInner.style.justifyContent = 'center';
            profileInner.style.alignItems = 'center';
            profileInner.innerHTML = `
                <svg width="96" height="65" viewBox="0 0 96 65" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M26.5947 2.63867C33.5112 2.63879 39.161 8.50188 39.1611 15.7891C39.1611 23.0764 33.5113 28.9403 26.5947 28.9404C19.678 28.9404 14.0283 23.0765 14.0283 15.7891C14.0285 8.5018 19.6781 2.63867 26.5947 2.63867Z" fill="#FDFEFF" stroke="#FDFEFF" stroke-width="1.16899"/>

<path fill-rule="evenodd" clip-rule="evenodd" d="M40.3303 38.877C41.2987 38.877 42.0838 39.662 42.0838 40.6304V41.7994H43.2527C44.2212 41.7994 45.0062 42.5845 45.0062 43.5529C45.0062 44.5213 44.2212 45.3064 43.2527 45.3064H42.0838V46.4754C42.0838 47.4438 41.2987 48.2289 40.3303 48.2289C39.3618 48.2289 38.5768 47.4438 38.5768 46.4754V45.3064H37.4078C36.4394 45.3064 35.6543 44.5213 35.6543 43.5529C35.6543 42.5845 36.4394 41.7994 37.4078 41.7994H38.5768V40.6304C38.5768 39.662 39.3618 38.877 40.3303 38.877Z" fill="#0C9543" stroke="#FDFEFF" stroke-width="0.876744"/>
<path d="M68.1586 2.63867C75.0751 2.63879 80.7248 8.50188 80.725 15.7891C80.725 23.0764 75.0752 28.9403 68.1586 28.9404C61.2419 28.9404 55.5922 23.0765 55.5922 15.7891C55.5923 8.5018 61.242 2.63867 68.1586 2.63867Z" fill="#FDFEFF" stroke="#FDFEFF" stroke-width="1.16899"/>

</svg>`;
        }

        // Funções para o diálogo de alerta customizado
        function mostrarAlerta(mensagem) {
            document.getElementById('custom-alert-msg').textContent = mensagem;
            document.getElementById('custom-alert').style.display = 'flex';
        }

        function fecharAlerta() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        // 4. Função principal de envio (CORRIGIDA)
        async function enviarElogio() {
            const texto = document.getElementById('elogio-text').value.trim();
            const btn = document.getElementById('btn-enviar');

            if (!texto) {
                mostrarAlerta('Por favor escreva o seu elogio antes de enviar.');
                return;
            }

            btn.disabled = true;
            btn.textContent = "A enviar...";

            const formURL = 'https://docs.google.com/forms/u/0/d/e/1FAIpQLSfUMJ-pVGuYL89QuoaZPiUXajkB_T1pQvdNfDaHkpsdE4a3Pg/formResponse';

            const formData = new FormData();
            formData.append('entry.1843850860', nome || 'Equipa Médica');
            formData.append('entry.1964311871', texto);

            try {
                await fetch(formURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                window.location.href = './obg.html';
            } catch (error) {
                console.error('Erro:', error);
                mostrarAlerta('Houve um erro ao enviar. Verifique a sua ligação.');
                btn.disabled = false;
                btn.textContent = "Enviar elogio";
            }
        }

        // 5. Ajustar links para manter os parâmetros de nome/foto
        const inspLink = document.getElementById('insp-link');
        const inspUrl = new URL('./Insp.html', window.location.href);
        if (nome) inspUrl.searchParams.set('nome', nome);
        if (foto) inspUrl.searchParams.set('foto', foto);
        inspUrl.searchParams.set('return', 'elogio');
        inspLink.href = inspUrl.toString();

        const backLink = document.getElementById('back-link');
        if (!nome && !foto) {
            backLink.href = './equipa.html';
        }
    </script>
    <script src="./animations.js"></script>
</body>

</html>
