<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700;800&display=swap" />
    <title>Inspiração</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="./animations.js" defer></script>
</head>
<body>
    <div class="page insp-page">
        <!-- Botão voltar -->
        <a href="#" class="back-btn" id="back-btn" style="position: absolute; top: 34px; right: 16px; z-index: 10;">
            <span></span>
            <span></span>
        </a>

        <div class="header-title">
            <h1>Sem inspiração?<br><span class="highlight">Veja aqui!</span></h1>
        </div>

        <div class="content-panel">
            <h2>O que o seu<br>enfermeiro faz por si</h2>

            <div class="insp-list">
                <p><span class="light">Acompanha-me de perto e não </span><span class="strong">deixa que me esqueça dele</span></p>
                <p><span class="light">Sabe </span><span class="strong">ouvir-me</span></p>
                <p><span class="light">Tem sempre uma </span><span class="strong">palavra amiga</span></p>
                <p><span class="light">É um bom </span><span class="strong">profissional</span></p>
            </div>

            <!-- Gradiente de desvanecimento -->
            <div class="fade-overlay"></div>

            <a href="#" id="btn-elogio" class="btn-elogio">Deixa o teu elogio!</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const returnPage = params.get('return') || 'enf-ang';
        const nome = params.get('nome');
        const foto = params.get('foto');

        // Construir URL de retorno com os parâmetros preservados
        function buildReturnUrl(page) {
            const url = new URL('./' + page + '.html', window.location.href);
            if (nome) url.searchParams.set('nome', nome);
            if (foto) url.searchParams.set('foto', foto);
            return url.toString();
        }

        document.getElementById('back-btn').href = buildReturnUrl(returnPage);
        document.getElementById('btn-elogio').href = buildReturnUrl(returnPage);
    </script>
</body>
</html>
